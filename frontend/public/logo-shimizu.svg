<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 90" preserveAspectRatio="xMidYMid meet">
  <!-- 外側楕円 (細い線、 ほぼ水平) -->
  <ellipse cx="120" cy="45" rx="115" ry="36"
           fill="none" stroke="#d4001a" stroke-width="1.6"/>
  <!-- 内側楕円 (やや太い線、 少し時計回りに回転) -->
  <ellipse cx="120" cy="46" rx="106" ry="30"
           fill="none" stroke="#d4001a" stroke-width="2.6"
           transform="rotate(-1.8 120 46)"/>
  <!-- ロゴテキスト -->
  <text x="120" y="60"
        text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', Helvetica, sans-serif"
        font-weight="900"
        font-size="36"
        letter-spacing="1.5"
        fill="#d4001a">
    SHIMIZU
  </text>
</svg>
