[pytest]
# pytest-asyncio 設定
# auto モード: @pytest.mark.asyncio が無くても async test を自動でループに乗せる
# Python 3.14 で asyncio.get_event_loop() の auto-create が消えたため、
# strict モードだと一部 async fixture chain で event loop 取得に失敗する。
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 警告抑制 (pytest_asyncio plugin 内部の DeprecationWarning が大量)
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
